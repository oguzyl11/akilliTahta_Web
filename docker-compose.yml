version: '3.8'

# =============================================================================
# Dijital Eğitim Platformu — Docker Compose (Full Stack)
# Multi-tenant eğitim yönetim sistemi
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Frontend — Next.js 14
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dep-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:6001
    depends_on:
      - backend
    networks:
      - dep-network

  # ---------------------------------------------------------------------------
  # Backend — Laravel 11 (PHP 8.3)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dep-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_NAME=Dijital Eğitim Platformu
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - FRONTEND_URL=http://localhost:3000
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=dijital_egitim
      - DB_USERNAME=dep_user
      - DB_PASSWORD=dep_secret_2025
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - FILESYSTEM_DISK=s3
      - AWS_ACCESS_KEY_ID=minio_access_key
      - AWS_SECRET_ACCESS_KEY=minio_secret_key
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=dijital-egitim
      - AWS_ENDPOINT=http://minio:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - PDF_SERVICE_URL=http://pdf-service:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - dep-network

  # ---------------------------------------------------------------------------
  # Queue Worker — Laravel Queue (Redis)
  # ---------------------------------------------------------------------------
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dep-queue-worker
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=dijital_egitim
      - DB_USERNAME=dep_user
      - DB_PASSWORD=dep_secret_2025
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    depends_on:
      - backend
    networks:
      - dep-network

  # ---------------------------------------------------------------------------
  # PDF Service — Python FastAPI
  # ---------------------------------------------------------------------------
  pdf-service:
    build:
      context: ./pdf-service
      dockerfile: Dockerfile
    container_name: dep-pdf-service
    ports:
      - "8001:8001"
    volumes:
      - ./pdf-service:/app
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_access_key
      - MINIO_SECRET_KEY=minio_secret_key
      - MINIO_BUCKET=dijital-egitim
      - REDIS_URL=redis://redis:6379/1
      - API_SECRET=${PDF_SERVICE_SECRET:-pdf_service_secret_2025}
    depends_on:
      - minio
      - redis
    networks:
      - dep-network

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: dep-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=dijital_egitim
      - POSTGRES_USER=dep_user
      - POSTGRES_PASSWORD=dep_secret_2025
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dep_user -d dijital_egitim"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dep-network

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dep-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dep-network

  # ---------------------------------------------------------------------------
  # MinIO — S3-uyumlu Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: dep-minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      - MINIO_ROOT_USER=minio_access_key
      - MINIO_ROOT_PASSWORD=minio_secret_key
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - dep-network

  # ---------------------------------------------------------------------------
  # MinIO Bucket Init
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: dep-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minio_access_key minio_secret_key;
      mc mb myminio/dijital-egitim --ignore-existing;
      mc anonymous set download myminio/dijital-egitim/public;
      exit 0;
      "
    networks:
      - dep-network

  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: dep-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - dep-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  dep-network:
    driver: bridge
