# =============================================================================
# Nginx Reverse Proxy — Dijital Eğitim Platformu
# Wildcard subdomain desteği: *.platform.local
# =============================================================================

# Frontend (Next.js)
upstream frontend {
    server frontend:3000;
}

# Backend API (Laravel)
upstream backend {
    server backend:8000;
}

# PDF Service (FastAPI)
upstream pdf_service {
    server pdf-service:8001;
}

server {
    listen 80;
    server_name localhost *.platform.local;

    client_max_body_size 250M;  # PDF max 200MB + overhead

    # API istekleri → Laravel Backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket bağlantıları
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # PDF Service
    location /pdf-service/ {
        proxy_pass http://pdf_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # MinIO Object Storage (public files)
    location /storage/ {
        proxy_pass http://minio:9000/dijital-egitim/;
        proxy_set_header Host $host;
    }

    # Frontend (Next.js) — catch-all
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
